<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';    
async function extractText(file) {
const arrayBuffer = await file.arrayBuffer();
const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
let pages = [];
for (let i = 1; i <= pdf.numPages; i++) {
const page = await pdf.getPage(i);
const content = await page.getTextContent();
pages.push(content.items.map(item => item.str).join(" "));
}
return pages;
}
function getShiftDetails(text) {
    text = text.replace(/\s+/g, ' ');

    const dateMatch =
        text.match(/Test\s*Date\s*[:\s]*(\d{2}\/\d{2}\/\d{4})/i) ||
        text.match(/Date\s*[:\s]*(\d{2}\/\d{2}\/\d{4})/i) ||
        text.match(/(\d{2}\/\d{2}\/\d{4})/);

    const timeMatch = text.match(/(\d{1,2}:\d{2}\s*[APM]{2})/i);

    let shift = "First";

    if (timeMatch) {
        let timeStr = timeMatch[1];
        let hour = parseInt(timeStr.split(":")[0]);

        if (timeStr.toUpperCase().includes("PM") && hour !== 12) {
            hour += 12;
        }

        if (hour >= 14) shift = "Second";
    }

    return {
        date: dateMatch ? dateMatch[1] : "N/A",
        shift: shift
    };
  }
function getStudentDetails(text) {

    text = text.replace(/\s+/g, ' ');

    const nameMatch = text.match(/Candidate\s*Name\s*[:\s]*([A-Za-z\s]+)/i);

    let rollMatch =
        text.match(/Roll\s*No\.?\s*[:\s]*([A-Z0-9]+)/i) ||
        text.match(/Roll\s*No[\s\S]{0,30}?([A-Z0-9]{6,})/i) ||
        text.match(/Roll\s*Number\s*[:\s]*([A-Z0-9]+)/i) ||
        text.match(/Application\s*No\.?\s*[:\s]*([A-Z0-9]+)/i) ||
        text.match(/[A-Z]{2,}\d{6,}/i);

    return {
        name: nameMatch ? nameMatch[1].trim() : "N/A",
        roll: rollMatch ? (rollMatch[1] || rollMatch[0]) : "N/A"
    };
}
async function startAnalysis() {
const resFile = document.getElementById('resPdf').files[0];
const ansFile = document.getElementById('ansPdf').files[0];
if (!resFile || !ansFile) return alert("Please upload both PDFs.");

document.getElementById('loader').style.display = "block";    
const resPages = await extractText(resFile);    
const fullResText = resPages.join(" ");    
const shiftDetails = getShiftDetails(fullResText);    

// NO BLOCKING (analysis will continue)
if (!shiftDetails.date) {
    console.log("Shift not found, continuing...");
  }

// 🔥 sirf first page use karo
const student = getStudentDetails(fullResText);
const btn = document.getElementById('analyzeBtn');
btn.innerText = "⏳ Analyzing...";
btn.disabled = true;
btn.style.opacity = "0.7";
const ansPages = await extractText(ansFile);    
let answers = parseAnswerKey(ansPages.join(" "));    
let responses = parseResponse(fullResText);    
    
displayResults(responses, answers, shiftDetails, student);}
function parseAnswerKey(text) {
    const key = {};
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

    lines.forEach(line => {

        // 🟢 NEW FORMAT (Final Answer Key PDF)
        let newMatch = line.match(/^(\d{7,})\s+(\d{7,}(?:,\d{7,})?)/);

        if (newMatch) {
            const qid = newMatch[1];
            const ans = newMatch[2];

            if (!key[qid]) {
                key[qid] = ans.includes(",") ? ans.split(",") : ans;
            }
            return;
        }

        // 🔵 OLD FORMAT (Screenshot / simple PDF)
        const oldMatches = [...line.matchAll(/(\d+)\s+([^\s]+)/g)];

        oldMatches.forEach(m => {
            const qid = m[1];
            const ans = m[2];

            if (!key[qid]) {
                key[qid] = ans;
            }
        });

    });

    return key;
}
function parseResponse(text) {let data = [];
// Normalize text (important for messy PDFs)
text = text.replace(/\s+/g, ' ');
// Split using multiple safe patterns
const questionBlocks = text.split(/(?:Q.?\s*\d+|Question\s*\d+)/i).slice(1);
const qNumbers = [...text.matchAll(/(?:Q.?\s*(\d+)|Question\s*(\d+))/gi)]
.map(m => parseInt(m[1] || m[2]));

questionBlocks.forEach((sec, index) => {const qNum = qNumbers[index] || index + 1;    
    const qidMatch = sec.match(/Question\s*ID\s*[:\s]*(\d+)/i);    
    if (!qidMatch) return;    
    let sub = (qNum <= 25) ? "Maths" : (qNum <= 50 ? "Physics" : "Chemistry");    
    let ans = null;    
    // MCQ detection    
    const optMatch = sec.match(/Chosen\s*Option\s*[:\s]*([1-4])/i);    
    if (optMatch && optMatch[1] !== "0") {    
        const optIdRegex = new RegExp(`Option\\s*${optMatch[1]}\\s*ID\\s*[:\\s]*(\\d+)`, 'i');    
        const optIdMatch = sec.match(optIdRegex);    
        if (optIdMatch) ans = optIdMatch[1];}    
    // Numerical detection    
    else if (/Question\s*Type\s*[:\s]*SA/i.test(sec)) {    
        const numMatch = sec.match(/Ans\s*wer\s*[:\s]*([-+]?\d*\.?\d+)/i);    
        if (numMatch) ans = numMatch[1].trim();}    
    data.push({qNum,qid: qidMatch[1],ans,sub});});return data;}

function isNumericEqual(a, b) {
return Math.abs(parseFloat(a) - parseFloat(b)) < 0.0001;}
function displayResults(responses, answers, shift, student) {
let html = `<table id="mainTable">
<tr>
<th>#</th>
<th>Subject</th>
<th>Question ID</th>
<th>Your Ans</th>
<th>Correct Ans</th>
<th>Status</th>
<th>Marks</th>
</tr>`;

responses.forEach((r) => {    
    const correctAns = answers[r.qid];    
    let status = "Skipped", marks = 0, rowClass = "";    

    if (!correctAns) {    
status = "INVALID KEY";    
marks = 0;} else if (r.ans) {    
const isCorrect =
    Array.isArray(correctAns)
        ? correctAns.includes(r.ans.toString())
        : r.ans.toString() === correctAns.toString();
if (isCorrect) { status = "CORRECT"; marks = 4; rowClass = "correct"; }    
else { status = "WRONG"; marks = -1; rowClass = "wrong"; }

}

html += `<tr class="${rowClass}">    
        <td>${r.qNum}</td>    
        <td class="sub-cell ${r.sub.toLowerCase()}">${r.sub}</td>    
        <td>${r.qid}</td>    
        <td>${r.ans || '--'}</td>    
        <td>${correctAns || 'N/A'}</td>    
        <td class="status-cell">${status}</td>    
        <td class="mark-cell">${marks}</td>    
    </tr>`;    
});    

document.getElementById('tableContainer').innerHTML = html + "</table>";
calculateFromTable();

// 🔥 SAFE DOC ID (no duplicates + no overwrite issue)
const docId = (student.roll && student.roll !== "N/A")
  ? student.roll
  : "unknown_" + Date.now();

db.collection("results").doc(docId).set({
  name: student.name,
  roll: student.roll,
  score: window.g.score,
  correct: window.g.c,
  wrong: window.g.w,
  skipped: window.g.s,
  date: new Date().toISOString()
})
.then(() => {
  console.log("🔥 Data saved");
})
.catch((error) => {
  console.error("❌ Error saving:", error);
});
document.getElementById('loader').style.display = "none";    
document.getElementById('resultArea').style.display = "block";    
document.getElementById('studentInfo').innerHTML =
    `😎<span style="color:#4ade80">${student.name}</span> 
     &nbsp;&nbsp; | &nbsp;&nbsp; 
     🎫 <span style="color:#60a5fa">${student.roll}</span>`;
document.getElementById('shiftInfo').innerHTML =
`Date: ${shift.date || "N/A"} | Shift: ${shift.shift || "N/A"}`;
const btn = document.getElementById('analyzeBtn');
btn.innerText = "🚀 START ANALYSIS";
btn.disabled = false;
btn.style.opacity = "1";
}

function calculateFromTable() {
const rows = document.querySelectorAll("#mainTable tr:not(:first-child)");
let summary = {
"Maths": { c: 0, w: 0, s: 0, score: 0 },
"Physics": { c: 0, w: 0, s: 0, score: 0 },
"Chemistry": { c: 0, w: 0, s: 0, score: 0 }
};

rows.forEach(row => {    
    const sub = row.querySelector(".sub-cell").innerText;    
    const status = row.querySelector(".status-cell").innerText;    
    const marks = parseInt(row.querySelector(".mark-cell").innerText);    

    if (status === "CORRECT") summary[sub].c++;    
    else if (status === "WRONG") summary[sub].w++;    
    else summary[sub].s++;    
        
    summary[sub].score += marks;    
});    

let sumHtml = `<table class="summary-table"><tr><th>Subject</th><th>Correct</th><th>Incorrect</th><th>Skipped</th><th>Score</th><th>Accuracy</th></tr>`;    
let g = { c: 0, w: 0, s: 0, score: 0 };    

// Explicit order for the summary table    
const order = ["Maths", "Physics", "Chemistry"];    
order.forEach(s => {    
    let att = summary[s].c + summary[s].w;    
    let accVal = att > 0 ? (summary[s].c / att) * 100 : 0;
let accColor = accVal >= 80 ? "#38a169" : (accVal >= 50 ? "#ecc94b" : "#e53e3e");
let acc = `<span style="color:${accColor}; font-weight:bold;">${accVal.toFixed(1)}%</span>`;
sumHtml += `<tr>
<td>${s}</td>
<td>${summary[s].c}</td>
<td>${summary[s].w}</td>
<td>${summary[s].s}</td>
<td>${summary[s].score}</td>
<td>${acc}</td>
</tr>`;
g.c += summary[s].c; g.w += summary[s].w; g.s += summary[s].s; g.score += summary[s].score;
});

document.getElementById('summaryTableContainer').innerHTML = sumHtml + `<tr style="background:#4a044e; font-weight:bold; color:#f9a8d4; box-shadow:0 0 10px rgba(236,72,153,0.6);">

<td>TOTAL</td>  
<td>${g.c}</td>  
<td>${g.w}</td>  
<td>${g.s}</td>  
<td>${g.score}</td>  
<td>${(() => {  
    let acc = (g.c+g.w)>0 ? (g.c/(g.c+g.w))*100 : 0;  
    let color = acc >= 80 ? "#4ade80" : (acc >= 50 ? "#facc15" : "#f87171");  
    return `<span style="color:${color}; font-weight:bold;">${acc.toFixed(1)}%</span>`;  
})()}</td>  
</tr></table>`;   document.getElementById('totalScore').innerText = g.score;    
document.getElementById('totalScore').style.color =    
g.score >= 150 ? "#48bb78" : (g.score >= 100 ? "#ecc94b" : "#f56565");

document.getElementById('countCorrect').innerText = g.c;
document.getElementById('countWrong').innerText = g.w;
document.getElementById('countSkipped').innerText = g.s;
window.g = g;
}
window.onload = function() {

document.getElementById("resPdf").addEventListener("change", function() {
    document.getElementById("resText").innerText = this.files[0].name;
});

document.getElementById("ansPdf").addEventListener("change", function() {
    document.getElementById("ansText").innerText = this.files[0].name;
});

};
</script>     
</body>
